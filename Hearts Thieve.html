    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #111;
            color: white;
        }
        header {
            background-color: red;
            text-align: center;
            padding: 20px;
            border-bottom: 3px solid;
        }
        header h1 {
            font-size: 35px;
            text-shadow: 4px 4px 4px #000;
        }
        .box {
            border: 1px solid red;
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            background-color: #1a1a1a;
			max-width: 900px;
            margin: 30px auto;
		}
		h2{
			font-family: Constantia, 'Lucida Bright', 'DejaVu Serif', Georgia, 'serif';
			font-style: oblique;
		}
		.fm {
            display: flex;
            justify-content: center;
            background: #202020;
            padding: 12px 0;
            position: relative;
        }
        .fm a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
		.C{
			margin: 0px 30px 0px 30px;
            position: relative;
		}
        .sm {
            display: none;
            position: absolute;
            background: #494949;
			width: 60px;
        }
		.sm a {
            display: block;
            padding: 2px 2px 8px 12px;
        }
		.C:hover .sm {
            display: block;
        }
		.text{
			background-color: #303030;
		}
		p {
  			line-height: 1.6; 
  			font-size: 16px;
			text-indent: 2em;
		}
		img{
			width: 300px;
			float: left;
		}
		#a{
  			width: 800px;
  			height: 150px;
  			overflow: hidden;
  			margin: 30px auto;
		}
		ul{
			list-style: none;
			display: flex
		}
		#b {
		  display: flex;
		  animation: scroll 30s linear infinite;
		}
		@keyframes scroll {
			0% { transform: translateX(0px); }
			100% { transform: translateX(-3000px); }
		}
    </style>
</head>
