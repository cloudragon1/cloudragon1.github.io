    <style>
        * {

		}
		.fm {
            display: flex;
            justify-content: center;

            padding: 12px 0;

        }
        .fm a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

		}
        .sm {
            display: none;
            position: absolute;
            background: #494949;
			width: 60px;
		}
		.sm a {
            display: block;
            padding: 2px 2px 8px 12px;
        }
		.C:hover .sm {
